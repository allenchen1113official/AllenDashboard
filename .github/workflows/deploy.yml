# ═══════════════════════════════════════════════════════════
#  Deploy Allen Dashboard to GitHub Pages
#
#  Setup (one-time):
#  1. Repo → Settings → Pages → Source: "GitHub Actions"
#  2. Repo → Settings → Secrets → Actions, add three secrets:
#       APPWRITE_ENDPOINT  (optional, default: https://cloud.appwrite.io/v1)
#       APPWRITE_SALT      (generated by setup.html)
#       APPWRITE_CIPHER    (generated by setup.html)
#
#  If secrets are not set, the site runs in localStorage-only demo mode.
# ═══════════════════════════════════════════════════════════

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/personal-dashboard-website-iWovw   # current dev branch
  workflow_dispatch:                               # manual trigger

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Generate config.js ──────────────────────────────
      # Writes encrypted credentials from GitHub Secrets into config.js.
      # If secrets are absent the placeholder causes app to fall back to
      # localStorage mode (fully functional offline / demo experience).
      - name: Generate config.js
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_SALT:     ${{ secrets.APPWRITE_SALT }}
          APPWRITE_CIPHER:   ${{ secrets.APPWRITE_CIPHER }}
        run: |
          node - << 'EOF'
          const fs       = require('fs');
          const endpoint = process.env.APPWRITE_ENDPOINT || 'https://cloud.appwrite.io/v1';
          const salt     = process.env.APPWRITE_SALT     || '';
          const cipher   = process.env.APPWRITE_CIPHER   || '';

          let content;
          if (salt && cipher) {
            // Encrypted mode — safe to deploy, passphrase required at runtime
            content = [
              `// Auto-generated by GitHub Actions — do not edit manually`,
              `const APPWRITE_ENDPOINT = '${endpoint}';`,
              `const APPWRITE_SALT     = '${salt}';`,
              `const APPWRITE_CIPHER   = '${cipher}';`,
            ].join('\n');
            console.log('config.js: encrypted mode');
          } else {
            // Fallback: no secrets configured → app runs in localStorage mode
            content = [
              `// Auto-generated by GitHub Actions (no secrets configured)`,
              `// App will run in localStorage-only mode.`,
              `const APPWRITE_ENDPOINT   = '${endpoint}';`,
              `const APPWRITE_PROJECT_ID = 'YOUR_PROJECT_ID';`,
              `const APPWRITE_DB_ID      = 'YOUR_DATABASE_ID';`,
              `const APPWRITE_COL_CONFIG  = 'YOUR_CONFIG_COLLECTION_ID';`,
              `const APPWRITE_COL_EVENTS  = 'YOUR_EVENTS_COLLECTION_ID';`,
              `const APPWRITE_COL_HISTORY = 'YOUR_HISTORY_COLLECTION_ID';`,
            ].join('\n');
            console.log('config.js: localStorage-only fallback (no secrets set)');
          }

          fs.writeFileSync('config.js', content + '\n');
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
